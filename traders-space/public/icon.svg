<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1d17"/>
      <stop offset="100%" stop-color="#05120e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10d9a0"/>
      <stop offset="100%" stop-color="#3ee7bc"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- orbital rings suggesting "space" -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#10d9a0" stroke-width="1.5" opacity="0.12"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#10d9a0" stroke-width="1" opacity="0.08"/>

  <!-- Stylized S formed from continuous flowing strokes -->
  <path
    d="M 348 168
       C 348 138, 308 124, 256 124
       C 204 124, 164 148, 164 188
       C 164 228, 200 240, 256 256
       C 312 272, 348 284, 348 324
       C 348 364, 308 388, 256 388
       C 204 388, 164 374, 164 344"
    fill="none"
    stroke="url(#grad)"
    stroke-width="34"
    stroke-linecap="round"
  />

  <!-- accent dot — the next opportunity -->
  <circle cx="348" cy="324" r="14" fill="#10d9a0"/>
  <circle cx="348" cy="324" r="26" fill="#10d9a0" opacity="0.25"/>
</svg>
