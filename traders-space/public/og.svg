<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05120e"/>
      <stop offset="100%" stop-color="#0a1d17"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10d9a0"/>
      <stop offset="100%" stop-color="#3ee7bc"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10d9a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10d9a0" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10d9a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10d9a0" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0%" stop-color="#10d9a0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10d9a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#orb)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>

  <!-- brand logo + name -->
  <g transform="translate(80, 70)">
    <rect width="56" height="56" rx="14" fill="url(#bg)" stroke="#10d9a0" stroke-opacity="0.25"/>
    <path
      d="M 41 18 C 41 14 36 12 28 12 C 20 12 14 16 14 22 C 14 28 20 30 28 32 C 36 34 41 36 41 42 C 41 48 36 50 28 50 C 20 50 14 48 14 44"
      fill="none"
      stroke="url(#grad)"
      stroke-width="4"
      stroke-linecap="round"
      transform="translate(8, 8) scale(1)"
    />
    <text x="80" y="35" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#f4f4f5" letter-spacing="-0.5">Traders Space</text>
    <text x="80" y="56" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#10d9a0" letter-spacing="3">JOURNAL · ANALYTICS</text>
  </g>

  <!-- equity curve -->
  <g transform="translate(680, 200)">
    <path d="M0,200 L60,180 L120,170 L180,140 L240,150 L300,110 L360,90 L420,60 L480,30 L480,200 Z" fill="url(#fill)"/>
    <path d="M0,200 L60,180 L120,170 L180,140 L240,150 L300,110 L360,90 L420,60 L480,30" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="480" cy="30" r="6" fill="#10d9a0"/>
    <circle cx="480" cy="30" r="14" fill="#10d9a0" fill-opacity="0.25"/>
  </g>

  <!-- headline -->
  <text x="80" y="290" font-family="Outfit, system-ui, sans-serif" font-size="72" font-weight="800" fill="#f4f4f5" letter-spacing="-2.5">Your trading edge</text>
  <text x="80" y="368" font-family="Outfit, system-ui, sans-serif" font-size="72" font-weight="800" letter-spacing="-2.5">
    <tspan fill="#10d9a0">deserves a home.</tspan>
  </text>

  <text x="80" y="440" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a1a1aa">Premium trading journal — track trades, journal in flow,</text>
  <text x="80" y="470" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="400" fill="#a1a1aa">find your real edge. Free forever.</text>

  <!-- pills -->
  <g transform="translate(80, 520)">
    <rect width="170" height="42" rx="10" fill="rgba(16,217,160,0.1)" stroke="#10d9a0" stroke-opacity="0.3"/>
    <text x="20" y="27" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#10d9a0">FREE FOREVER</text>

    <rect x="186" width="180" height="42" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="206" y="27" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#f4f4f5">YOUR DATA, YOUR DEVICE</text>

    <rect x="382" width="170" height="42" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
    <text x="402" y="27" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#f4f4f5">NO SIGNUP</text>
  </g>
</svg>
